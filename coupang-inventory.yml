name: MORIVA 쿠팡 재고 자동 수집

on:
  schedule:
    # UTC 15:00 = 한국시간(KST) 00:00 매일 실행
    - cron: "0 15 * * *"
  workflow_dispatch: {}  # 수동 실행 버튼 (Actions 탭에서 즉시 테스트 가능)

permissions:
  contents: write  # 결과 파일을 저장소에 커밋하기 위해 필요

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 쿠팡 재고 수집 실행
        env:
          COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
          COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
          COUPANG_VENDOR_ID: ${{ secrets.COUPANG_VENDOR_ID }}
        run: node scripts/collect-inventory.mjs

      - name: 결과 파일 커밋 & 푸시
        run: |
          git config user.name "moriva-inventory-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: 쿠팡 재고 자동 수집 $(date -u +'%Y-%m-%d')"
          git push
